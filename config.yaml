name: semantic-segmentation-remote-sensing

model:
  name: MultiResolutionFusionNet
  num_classes: 6
  input_channels: [3, 8, 2]
  fusion_type: deep
  backbone: resnet50
  use_attention: true
  dropout_rate: 0.5

training:
  device: cuda
  epochs: 100
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 1e-4
  loss_function: dice
  optimizer: adam
  scheduler: cosine
  early_stopping_patience: 15
  gradient_clip: 1.0

data:
  train_dir: ./data/processed/train
  val_dir: ./data/processed/val
  test_dir: ./data/processed/test
  img_size: [512, 512]
  num_workers: 4

augmentation:
  enabled: true
  random_flip: 0.5
  random_rotate: 0.3

logging:
  log_dir: ./results/logs
  checkpoint_dir: ./results/checkpoints
  save_frequency: 5
